id: io.github.yasome.FinalRom
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: final_rom

# The Flutter GTK embedder needs GTK3 + glib (provided by the GNOME runtime) and
# a C++20 compiler (chdman_ffi requires it); the GNOME 48 SDK ships GCC 14.

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Writes each output next to its source file (batch mode runs over whole
  # folders), which the file-chooser portal can't grant. Use --filesystem=home
  # to limit access to the user's home tree.
  - --filesystem=host

# Strip the build-only Flutter SDK from the final export.
cleanup:
  - /flutter

modules:
  # Generated by flatpak-flutter (see README): pinned Flutter 3.44.3 + offline
  # engine, installed to /app/flutter. Do not hand-edit.
  - flutter-sdk.json

  - name: final-rom
    buildsystem: simple
    build-options:
      append-path: /app/flutter/bin:/app/flutter/bin/cache/dart-sdk/bin
      env:
        PUB_CACHE: /run/build/final-rom/.pub-cache
    build-commands:
      - flutter config --no-analytics --enable-linux-desktop
      - flutter pub get --offline
      - flutter build linux --release
      # Ship the whole relocatable bundle; the binary's RPATH is $ORIGIN/lib so
      # the plugin .so files load from the sibling lib/ directory.
      - cp -r build/linux/*/release/bundle /app/final_rom
      - install -d /app/bin
      - ln -s /app/final_rom/final_rom /app/bin/final_rom
      - install -Dm644 flatpak/io.github.yasome.FinalRom.metainfo.xml -t /app/share/metainfo
      - install -Dm644 flatpak/io.github.yasome.FinalRom.desktop -t /app/share/applications
      - install -Dm644 flatpak/icons/128x128/io.github.yasome.FinalRom.png -t /app/share/icons/hicolor/128x128/apps
      - install -Dm644 flatpak/icons/256x256/io.github.yasome.FinalRom.png -t /app/share/icons/hicolor/256x256/apps
    sources:
      # Flathub requires a pinned git source. Fill in the release commit before
      # submitting (a tag alone is not accepted by the Flathub build service).
      # For LOCAL test builds, replace this block with:  - type: dir\n    path: ..
      - type: git
        url: https://github.com/Yasome/FinalRom.git
        tag: v1.0.0
        # commit: 0000000000000000000000000000000000000000

      # Generated by flatpak-flutter from pubspec.lock: pub packages as offline
      # sources. Do not hand-edit.
      - pubspec-sources.json
